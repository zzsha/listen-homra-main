name: Update Music Library + Auto Convert MP3 to M4A

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tools
        run: sudo apt update && sudo apt install -y mediainfo ffmpeg

      # 👇 绝对安全的 MP3 → M4A 转换
      - name: Convert MP3 to M4A safely
        run: |
          cd songs 2>/dev/null || exit 0
          for f in *.mp3; do
            [ -f "$f" ] || continue
            ffmpeg -i "$f" -c:a aac -b:a 128k -ar 44100 -f mp4 "${f%.mp3}.m4a" -y
            rm -f "$f"
          done

      # 👇 生成 JSON
      - name: Generate music library
        run: |
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const SONGS_DIR = './songs';
          const OUTPUT = 'music_library.json';
          const ALLOW = ['.m4a', '.ogg', '.flac', '.wav', '.aac'];

          if (!fs.existsSync(SONGS_DIR)) { fs.writeFileSync(OUTPUT, '[]'); process.exit(); }

          const songs = [];
          for (const f of fs.readdirSync(SONGS_DIR)) {
            const ext = path.extname(f).toLowerCase();
            if (!ALLOW.includes(ext)) continue;

            const full = path.join(SONGS_DIR, f);
            const stat = fs.statSync(full);
            const name = path.basename(f, ext);

            let artist = '未知歌手';
            let title = name;
            if (name.includes('-')) {
              const p = name.split('-');
              artist = p.pop().trim();
              title = p.join('-').trim();
            }

            songs.push({ file: f, title, artist, size: stat.size });
          }

          fs.writeFileSync(OUTPUT, JSON.stringify(songs, null, 2));
        shell: node

      # 👇 更新 README
      - name: Update README
        run: |
          const fs = require('fs');
          const lib = JSON.parse(fs.readFileSync('music_library.json', 'utf8'));
          const total = lib.length;
          const sz = lib.reduce((a,b)=>a+b.size,0);
          const fmt = (b)=>(b/1024/1024).toFixed(1)+'MB';

          let md = '# 音乐库\n\n总计 '+total+' 首 | 总大小 '+fmt(sz)+'\n\n| 歌曲 | 歌手 |\n|---|---|\n';
          lib.forEach(i=>{ md += '| '+i.title+' | '+i.artist+' |\n'; });

          fs.writeFileSync('README.md', md);
        shell: node

      # 👇 安全提交（绝对不会失败）
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update music library [skip ci]"