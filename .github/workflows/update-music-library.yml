# .github/workflows/update-music-library.yml
name: Update Music Library

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and ffmpeg with libfdk_aac
        run: |
          sudo apt-get update
          sudo apt-get install -y mediainfo
          
          # 下载静态编译的 ffmpeg（包含 libfdk_aac）
          # 使用更可靠的 CDN 镜像（jsdelivr）
          echo "下载 ffmpeg ..."
          curl -L -o ffmpeg.tar.xz https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          if [ $? -ne 0 ]; then
            echo "下载失败，尝试备用源"
            curl -L -o ffmpeg.tar.xz https://fastly.jsdelivr.net/gh/BtbN/FFmpeg-Builds@latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          fi
          tar xf ffmpeg.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          rm -rf ffmpeg-master-latest-linux64-gpl*
          
          ffmpeg -version | grep -i fdk_aac

      - name: Convert MP3 to HE-AAC M4A
        run: |
          for mp3file in ./songs/*.mp3; do
            if [ -f "$mp3file" ]; then
              filename=$(basename "$mp3file" .mp3)
              echo "转换: $mp3file"
              # 使用 HE-AAC 编码，比特率 48k，与能播放的 M4A 一致
              ffmpeg -i "$mp3file" -c:a libfdk_aac -profile:a aac_he -b:a 48k -ac 2 -ar 44100 -movflags +faststart -f mp4 -brand mp42 "./songs/${filename}.m4a" -y
              if [ $? -eq 0 ]; then
                rm -f "$mp3file"
                echo "✅ 转换成功: ${filename}.m4a"
              else
                echo "❌ 转换失败: $mp3file"
                exit 1
              fi
            fi
          done

      - name: Generate music library
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");
          const { execSync } = require("child_process");
          
          const SONGS_DIR = "./songs";
          const OUTPUT = "./music_library.json";
          const EXTENSIONS = [".mp3", ".m4a", ".flac", ".wav", ".ogg", ".opus", ".aac"];
          
          function getMetadata(file) {
            try {
              const out = execSync(`mediainfo --Output=JSON "${file}"`, { encoding: "utf8" });
              const track = JSON.parse(out).media?.track?.find(t => t["@type"] === "Audio");
              if (track) return {
                duration: track.Duration ? parseFloat(track.Duration) : null,
                bitRate: track.BitRate ? parseInt(track.BitRate) : null,
                sampleRate: track.SamplingRate ? parseInt(track.SamplingRate) : null,
                channels: track.Channels ? parseInt(track.Channels) : null,
                codec: track.CodecID || track.Format,
                bitDepth: track.BitDepth ? parseInt(track.BitDepth) : null,
                title: track.Title,
                album: track.Album,
                artist: track.Artist,
                genre: track.Genre,
                year: track.Recorded_Date || track.Original_Released_Date
              };
            } catch { return null; }
          }
          
          const songs = fs.existsSync(SONGS_DIR) 
            ? fs.readdirSync(SONGS_DIR)
                .filter(f => EXTENSIONS.includes(path.extname(f).toLowerCase()))
                .map(f => {
                  const stats = fs.statSync(path.join(SONGS_DIR, f));
                  const name = f.slice(0, -path.extname(f).length);
                  const dash = name.lastIndexOf("-");
                  return {
                    fileName: f,
                    fileSize: stats.size,
                    extension: path.extname(f),
                    artist: dash !== -1 ? name.substring(dash + 1).trim() : "千千音乐",
                    metadata: getMetadata(path.join(SONGS_DIR, f)) || {}
                  };
                })
                .sort((a, b) => a.fileName.localeCompare(b.fileName))
            : [];
          
          console.log(`✅ 找到 ${songs.length} 首歌曲`);
          fs.writeFileSync(OUTPUT, JSON.stringify(songs, null, 2));
          '

      - name: Update README
        run: |
          node -e '
          const fs = require("fs");
          
          if (!fs.existsSync("./music_library.json")) process.exit(0);
          
          const songs = JSON.parse(fs.readFileSync("./music_library.json"));
          const total = songs.length;
          const totalSize = songs.reduce((s, song) => s + (song.fileSize || 0), 0);
          const formats = {};
          songs.forEach(s => formats[s.extension] = (formats[s.extension] || 0) + 1);
          const lastUpdate = new Date().toLocaleString("zh-CN", { timeZone: "Asia/Shanghai" });
          
          const formatDuration = (s) => s ? `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}` : "--:--";
          const formatSize = (b) => b ? `${(b/(1024*1024)).toFixed(1)} MB` : "未知";
          const formatBitrate = (b) => b ? (b>1e6 ? `${(b/1e6).toFixed(1)} Mbps` : `${Math.round(b/1000)} kbps`) : "未知";
          
          const table = `| # | 歌曲 | 艺术家 | 时长 | 格式 | 大小 |\n|---|------|--------|------|------|------|\n${songs.map((s,i) => 
            `| ${i+1} | ${s.fileName.replace(/\.[^/.]+$/, "").slice(0, 40)} | ${s.artist} | ${formatDuration(s.metadata?.duration)} | ${s.extension.toUpperCase().slice(1)} | ${formatSize(s.fileSize)} |`
          ).join("\n")}`;
          
          const details = songs.map((s,i) => {
            const m = s.metadata;
            return `<details><summary><strong>${i+1}. ${s.fileName}</strong> - ${s.artist} (${formatDuration(m?.duration)})</summary>\n\n| 属性 | 详情 |\n|------|------|\n| 📁 文件 | \`${s.fileName}\` |\n| 🎤 艺术家 | ${s.artist} |\n| ⏱️ 时长 | ${formatDuration(m?.duration)} |\n| 💾 大小 | ${formatSize(s.fileSize)} |\n| 🎵 编码 | ${m?.codec || "未知"} |\n| 📊 比特率 | ${formatBitrate(m?.bitRate)} |\n| 🎚️ 采样率 | ${m?.sampleRate ? (m.sampleRate/1000).toFixed(1) + " kHz" : "未知"} |\n| 🔊 声道 | ${m?.channels || "未知"} |\n${m?.album ? `| 💿 专辑 | ${m.album} |\n` : ""}${m?.genre ? `| 🎸 流派 | ${m.genre} |\n` : ""}${m?.year ? `| 📅 年份 | ${m.year} |\n` : ""}\n</details>\n`;
          }).join("\n");
          
          const formatBadges = Object.entries(formats).map(([ext, count]) => 
            `<img src="https://img.shields.io/badge/${ext.slice(1).toUpperCase()}-${count}-blue?style=flat-square" />`
          ).join(" ");
          
          const readme = `# 🎵 音乐库\n\n<div align="center">\n\n![曲目](https://img.shields.io/badge/曲目总数-${total}-orange?style=for-the-badge)\n![大小](https://img.shields.io/badge/总大小-${(totalSize/(1024*1024*1024)).toFixed(2)}GB-blue?style=for-the-badge)\n\n</div>\n\n## 📊 统计\n\n| 项目 | 数据 |\n|------|------|\n| 🎵 曲目 | **${total}** 首 |\n| 💾 大小 | **${(totalSize/(1024*1024*1024)).toFixed(2)} GB** |\n| 📅 更新 | ${lastUpdate} |\n| 📋 格式 | ${formatBadges} |\n\n---\n\n## 🎼 音乐列表\n\n### 快速浏览\n\n${table}\n\n### 详细信息\n\n${details}\n\n---\n\n<sub>✨ 自动更新于 ${lastUpdate}</sub>\n`;
          
          fs.writeFileSync("./README.md", readme);
          console.log("✅ README 已更新");
          '

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add music_library.json README.md
          git diff --cached --quiet || git commit -m "chore: update music library [skip ci]"
          git push